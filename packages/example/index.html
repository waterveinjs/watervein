<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>watervein Core Metrics Dashboard</title>
    <style>
        body {
            background-color: #f5f7fa;
            margin: 0;
            color: #333;
        }
        .monitoring-dashboard {
            max-width: 1200px;
            margin: 0 auto;
        }
        .panel {
            background: white;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .card {
            background: #f8fafc;
            padding: 15px;
            border-radius: 6px;
            border: 1px solid #e2e8f0;
            margin-top: 10px;
        }
        button {
            background: #1890ff;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 8px;
            transition: background 0.2s;
        }
        button:hover {
            background: #40a9ff;
        }
    </style>
</head>
<body>
    <script type="module" src="/src/index.ts"></script>
</body>
</html>
